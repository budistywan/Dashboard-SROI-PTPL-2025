<style>

  /* ── LAYOUT ── */
  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .items-center { align-items: center; }
  .items-start { align-items: flex-start; }
  .justify-between { justify-content: space-between; }

  .gap-8 { gap: 8px; }

  .gap-12 { gap: 12px; }
  .gap-14 { gap: 14px; }

  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }

  /* ── BUTTON ── */

  .btn-outline { background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-danger { background: var(--danger-light); color: var(--danger); border: 1px solid var(--danger-border); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 9px; }

  /* ── INPUT / TEXTAREA ── */
  .inp { width: 100%; padding: 9px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; font-size: 13px; color: var(--text-primary); font-family: var(--font-body); outline: none; transition: border-color 0.15s; }
  .inp:focus { border-color: var(--accent-mid); }
  .inp-search { padding-left: 34px; background: var(--surface-alt); }
  textarea.inp { min-height: 90px; resize: vertical; }
  .inp-mono { font-family: 'Courier New', monospace; font-size: 11px; background: #1e1b18; color: #d4e8c4; border-color: #3a3530; }
  label.lbl { font-size: 11px; color: var(--text-secondary); font-weight: 500; display: block; margin-bottom: 5px; }

  /* ── BADGE ── */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-accent { background: var(--accent-light); color: var(--accent); border: 1px solid #c7d2fe; }
  .badge-gray { background: var(--surface-alt); color: var(--text-secondary); border: 1px solid var(--border); }
  .badge-success { background: var(--success-light); color: var(--success); border: 1px solid #bbf7d0; }

  /* ── ACCORDION ── */
  .acc-item { border: 1px solid var(--border); border-radius: 13px; background: var(--surface); overflow: hidden; margin-bottom: 8px; }
  .acc-trigger { width: 100%; text-align: left; padding: 14px 18px; background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-primary); font-family: var(--font-display); display: flex; justify-content: space-between; align-items: center; }
  .acc-trigger:hover { background: var(--surface-alt); }
  .acc-content { padding: 0 18px 18px; }
  .acc-icon { font-size: 16px; transition: transform 0.2s; color: var(--text-muted); }
  .acc-icon.open { transform: rotate(180deg); }

  /* ── TABS ── */
  .tabs-list { display: flex; gap: 4px; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 12px; padding: 4px; width: fit-content; margin-bottom: 16px; }
  .tab-btn { padding: 7px 16px; border-radius: 9px; border: none; background: none; font-size: 12px; font-weight: 600; color: var(--text-secondary); cursor: pointer; font-family: var(--font-body); transition: all 0.15s; }
  .tab-btn.active { background: var(--surface); color: var(--text-primary); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

  /* ── SIDEBAR LIST ── */
  .sidebar-item { width: 100%; text-align: left; border-radius: 11px; padding: 11px 13px; background: var(--bg); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; margin-bottom: 6px; }
  .sidebar-item:hover { border-color: var(--accent-mid); }
  .sidebar-item.active { background: var(--accent-light); border-color: #c7d2fe; }

  /* ── TABLE ── */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th { text-align: left; padding: 8px 10px; font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .tbl td { padding: 10px; font-size: 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .tbl td:first-child { color: var(--text-secondary); font-size: 11px; width: 280px; }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 22px; width: 100%; max-width: 900px; max-height: 92vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
  .modal-header { padding: 22px 26px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .modal-body { flex: 1; overflow-y: auto; padding: 20px 26px; }
  .modal-footer { padding: 14px 26px; border-top: 1px solid var(--border); flex-shrink: 0; }

  /* ── SCROLLABLE SIDEBAR ── */
  .sidebar-scroll { flex: 1; overflow-y: auto; padding: 0 10px 12px; }
  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  /* ── KPI CARD ── */
  .kpi-card { border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); border: 1px solid var(--border); background: var(--surface); animation: fadeUp 0.35s ease both; }
  .kpi-card.accent { background: var(--accent-light); border-color: #c7d2fe; }
  .kpi-card.success { background: var(--success-light); border-color: #bbf7d0; }
  .kpi-icon { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; background: var(--surface-alt); flex-shrink: 0; }
  .kpi-card.accent .kpi-icon { background: #c7d2fe; }
  .kpi-card.success .kpi-icon { background: #bbf7d0; }

  /* ── TOC FLOW ── */
  .toc-box { border-radius: 12px; padding: 12px 14px; min-height: 100px; border: 1px solid var(--border); position: relative; }

  /* ── INFO BOX ── */
  .info-box { background: var(--surface-alt); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; min-height: 90px; }

  /* ── SROI RING TEXT ── */
  .sroi-label { font-size: 28px; font-weight: 800; color: var(--accent); font-family: var(--font-display); letter-spacing: -0.04em; }

  /* ── DIVIDER ── */
  .divider { height: 1px; background: var(--border); margin: 8px 0; }

  /* ── ANIM ── */
  @keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.3s ease both; }

  /* ── UTILITY ── */
  .text-accent { color: var(--accent); }
  .text-muted { color: var(--text-muted); }
  .text-secondary { color: var(--text-secondary); }
  .text-success { color: var(--success); }
  .text-danger { color: var(--danger); }
  .italic { font-style: italic; }
  .pre { white-space: pre-wrap; }
  .mono { font-family: 'Courier New', monospace; }
  .truncate { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .clamp2 { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .relative { position: relative; }
  .mt-4 { margin-top: 4px; }
  .mt-6 { margin-top: 6px; }
  .mt-8 { margin-top: 8px; }
  .mt-12 { margin-top: 12px; }
  .mt-16 { margin-top: 16px; }
  .mb-6 { margin-bottom: 6px; }
  .mb-8 { margin-bottom: 8px; }
  .mb-12 { margin-bottom: 12px; }
  .overflow-hidden { overflow: hidden; }
  .w-280 { width: 280px; }
  .h-full { height: 100%; }
  .pb-24 { padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .json-pre { font-family: 'Courier New', monospace; font-size: 11px; background: #1e1b18; color: #d4e8c4; border-radius: 12px; padding: 16px 20px; overflow-x: auto; max-height: 320px; line-height: 1.6; }
</style>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, RadialBarChart, RadialBar } = Recharts;

// ─── SCHEMA ────────────────────────────────────────────────────────────────
const COLUMN_SCHEMA = [
  { key:"nama_cdo", label:"Kolom 1: Nama CDO (Nama Penyusun)", group:"Identitas" },
  { key:"unit_kerja", label:"Kolom 2: Unit Kerja", group:"Identitas" },
  { key:"lokasi_pelaksanaan", label:"Kolom 3: Lokasi Pelaksanaan", group:"Identitas" },
  { key:"permasalahan", label:"Kolom 4: Permasalahan", group:"Framing" },
  { key:"program", label:"Kolom 5: Program", group:"Framing" },

  { key:"kondisi_sebelum_lingkungan", label:"Kolom 19: Kondisi Sebelum (Lingkungan)", group:"Baseline" },
  { key:"kondisi_sebelum_wellbeing", label:"Kolom 20: Kondisi Sebelum (Well-Being)", group:"Baseline" },

  { key:"indikator_sosial", label:"Kolom 26: Indikator Kuantitatif (Sosial)", group:"Indikator" },
  { key:"indikator_lingkungan", label:"Kolom 27: Indikator Kuantitatif (Lingkungan)", group:"Indikator" },
  { key:"indikator_wellbeing", label:"Kolom 28: Indikator Kuantitatif (Well-Being)", group:"Indikator" },
  { key:"monetisasi_aspek", label:"Kolom 29: Monetisasi Sebelum Fiksasi (Aspek)", group:"Monetisasi" },

  { key:"monetisasi_2023", label:"Kolom 31: Monetisasi Sebelum Fiksasi (2023)", group:"Monetisasi" },

  { key:"nilai_monetisasi_aspek", label:"Kolom 36: Nilai Monetisasi Final (Aspek)", group:"Nilai Final" },
  { key:"nilai_monetisasi_2022", label:"Kolom 37: Nilai Monetisasi Final (2022)", group:"Nilai Final" },
  { key:"nilai_monetisasi_2023", label:"Kolom 38: Nilai Monetisasi Final (2023)", group:"Nilai Final" },
  { key:"nilai_monetisasi_2024", label:"Kolom 39: Nilai Monetisasi Final (2024)", group:"Nilai Final" },
  { key:"informasi_umum", label:"Kolom 40: Informasi Umum", group:"Catatan" },
];
const GROUP_ORDER = ["Identitas","Framing","Intervensi","Baseline","Outcome","Indikator","Monetisasi","Fiksasi","Nilai Final","Catatan"];
const groupedColumns = GROUP_ORDER.map(g => ({ group: g, columns: COLUMN_SCHEMA.filter(c => c.group === g) }));

// ─── HELPERS ───────────────────────────────────────────────────────────────
const toNum = v => {
  if (typeof v === "number") return isFinite(v) ? v : 0;
  if (typeof v !== "string") return 0;
  const n = parseFloat(v.replace(/[^0-9,.-]/g,"").replace(/\.(?=.*\.)/g,"").replace(/,/g,""));
  return isFinite(n) ? n : 0;
};
const fmt = v => new Intl.NumberFormat("id-ID").format(isFinite(v)?v:0);
const fmtCur = v => `Rp ${fmt(v)}`;
const fmtShort = v => v>=1e9?`Rp ${(v/1e9).toFixed(2)} M`:v>=1e6?`Rp ${(v/1e6).toFixed(1)} jt`:fmtCur(v);
const getBen = r => { const n=Array.isArray(r?.ontology?.beneficiaries)?r.ontology.beneficiaries.reduce((s,i)=>s+toNum(i?.count??0),0):0; return n>0?n:toNum(r?.penerima_manfaat||0); };
const getOutcome = r => { const c=[r?.nilai_monetisasi_2024,r?.nilai_monetisasi_2023,r?.nilai_monetisasi_2022,r?.monetisasi_2024,r?.monetisasi_2023,r?.monetisasi_2022].map(toNum); return c.find(v=>v>0)||0; };
const getInvest = r => toNum(r?.investasi_nominal||0);
const sroi = (o,i) => i?o/i:0;
const uid = () => ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));

// ─── SEED ──────────────────────────────────────────────────────────────────
const emptyOnt = () => ({ row_id:"", identity:{cdo_name:"",unit_kerja:"",lokasi:"",program:"",sub_program:""}, problems:[], activities:[], stakeholders:[], investments:[], beneficiaries:[], outputs:[], outcomes:[], indicators:[], valuations:[], adjustments:[], final_values:[], notes:[], column_bindings:{} });
const emptyRec = () => { const o={id:uid(),title:"",created_at:new Date().toISOString(),updated_at:new Date().toISOString(),ontology:emptyOnt()}; COLUMN_SCHEMA.forEach(c=>{o[c.key]="";}); return o; };
const seedData = () => {
  const r=emptyRec();
  r.title="Enduro Home Service";
  r.program="TJSL CSV PT Pertamina Lubricants";
  r.sub_program="Enduro Home Service";
  r.investasi_nominal="25000000";
  r.penerima_manfaat="25 siswa SMK";
  r.permasalahan="Penguatan keterampilan praktis berbasis layanan, kesiapan kerja, model home service, dan literasi produk Enduro.";
  r.output="Siswa memperoleh pelatihan teknik perbaikan kendaraan ringan, layanan home service, dan pengenalan pelumas Enduro.";
  r.nilai_monetisasi_2024="72576000";
  r.ontology={...emptyOnt(),row_id:"R_ENDURO_HOME_SERVICE_01",identity:{cdo_name:"",unit_kerja:"PT Pertamina Lubricants",lokasi:"",program:"TJSL CSV PT Pertamina Lubricants",sub_program:"Enduro Home Service"},problems:[{id:"P1",label:"penguatan keterampilan praktis berbasis layanan"},{id:"P2",label:"kesiapan kerja dan transisi sekolah-ke-kerja"},{id:"P3",label:"kompetensi layanan jemput bola"},{id:"P4",label:"literasi produk Enduro untuk shared value"}],beneficiaries:[{id:"B1",label:"siswa SMK",type:"direct",count:25}],valuations:[{id:"V1",label:"nilai outcome",value_2024:72576000}],notes:[{id:"N1",type:"csv_logic",text:"Shared value dibentuk melalui kompetensi siswa dan literasi produk Enduro."}],column_bindings:{"4":["P1","P2","P3","P4"],"15":["B1"]}};
  return [r];
};

// ─── SVG ICONS (inline, no dependency) ────────────────────────────────────
const Icon = ({d,size=14,color="currentColor"}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
const IconPlus = ({size,color}) => <Icon size={size} color={color} d="M12 5v14M5 12h14"/>;
const IconSearch = ({size,color}) => <Icon size={size} color={color} d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>;
const IconEdit = ({size,color}) => <Icon size={size} color={color} d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>;
const IconTrash = ({size,color}) => <Icon size={size} color={color} d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>;
const IconSave = ({size,color}) => <Icon size={size} color={color} d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2zM17 21v-8H7v8M7 3v5h8"/>;
const IconJson = ({size,color}) => <Icon size={size} color={color} d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M9 15l-2 2 2 2M15 15l2 2-2 2"/>;
const IconDb = ({size,color}) => <Icon size={size} color={color} d="M12 2C8 2 3 3.8 3 6v12c0 2.2 5 4 9 4s9-1.8 9-4V6c0-2.2-5-4-9-4zM3 6c0 2.2 5 4 9 4s9-1.8 9-4M3 12c0 2.2 5 4 9 4s9-1.8 9-4"/>;
const IconChevron = ({size,color,dir="down"}) => { const rot=dir==="right"?"rotate(270deg)":dir==="up"?"rotate(180deg)":""; return <svg width={size||14} height={size||14} viewBox="0 0 24 24" fill="none" stroke={color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{transform:rot,display:"inline"}}><polyline points="6 9 12 15 18 9"/></svg>; };
const IconBar = ({size,color}) => <Icon size={size} color={color} d="M18 20V10M12 20V4M6 20v-6"/>;
const IconTrend = ({size,color}) => <Icon size={size} color={color} d="M23 6l-9.5 9.5-5-5L1 18M17 6h6v6"/>;
const IconLayers = ({size,color}) => <Icon size={size} color={color} d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>;
const IconWallet = ({size,color}) => <Icon size={size} color={color} d="M21 12V7H5a2 2 0 0 1 0-4h14v4M21 12v5H5a2 2 0 0 0 0 4h14v-4M21 12H3"/>;
const IconUsers = ({size,color}) => <Icon size={size} color={color} d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>;
const IconTarget = ({size,color}) => <Icon size={size} color={color} d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12zM12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>;
const IconSigma = ({size,color}) => <Icon size={size} color={color} d="M18 7V4H6l7 8-7 8h12v-3"/>;
const IconArrow = ({size,color}) => <Icon size={size} color={color} d="M7 17L17 7M7 7h10v10"/>;
const IconClose = ({size,color}) => <Icon size={size} color={color} d="M18 6L6 18M6 6l12 12"/>;

// ─── ACCORDION ─────────────────────────────────────────────────────────────
function Accordion({ label, children, defaultOpen=false }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className="acc-item">
      <button className="acc-trigger" onClick={()=>setOpen(p=>!p)}>
        {label}
        <span className={`acc-icon ${open?"open":""}`}>▾</span>
      </button>
      {open && <div className="acc-content">{children}</div>}
    </div>
  );
}

// ─── KPI CARD ──────────────────────────────────────────────────────────────
function KpiCard({ title, value, sub, IconC, variant="default", delay=0 }) {
  const cls = variant==="accent"?" accent":variant==="success"?" success":"";
  const iconColor = variant==="accent"?"var(--accent)":variant==="success"?"var(--success)":"var(--text-secondary)";
  const valColor = variant==="accent"?"var(--accent)":variant==="success"?"var(--success)":"var(--text-primary)";
  return (
    <div className={`kpi-card${cls}`} style={{animationDelay:`${delay*0.07}s`}}>
      <div className="flex items-center justify-between">
        <span className="label-caps">{title}</span>
        <div className="kpi-icon"><IconC size={15} color={iconColor}/></div>
      </div>
      <div>
        <p className="display" style={{fontSize:21,fontWeight:700,color:valColor,letterSpacing:"-0.02em"}}>{value}</p>
        {sub && <p style={{fontSize:11,color:"var(--text-muted)",marginTop:4}}>{sub}</p>}
      </div>
    </div>
  );
}

// ─── SROI RING ─────────────────────────────────────────────────────────────
function SROIRing({ value }) {
  const pct = Math.round(Math.min(value,10)/10*100);
  const data = [{name:"SROI",value:pct,fill:"var(--accent)"},{name:"",value:100-pct,fill:"var(--surface-alt)"}];
  return (
    <div className="flex flex-col items-center justify-center" style={{padding:"20px 0",gap:8}}>
      <div style={{position:"relative",width:140,height:72,overflow:"hidden"}}>
        <ResponsiveContainer width="100%" height={144}>
          <RadialBarChart cx="50%" cy="100%" innerRadius="68%" outerRadius="100%" startAngle={180} endAngle={0} data={data} barSize={13}>
            <RadialBar dataKey="value" cornerRadius={6}/>
          </RadialBarChart>
        </ResponsiveContainer>
        <div style={{position:"absolute",bottom:0,left:0,right:0,textAlign:"center"}}>
          <span className="sroi-label">{value.toFixed(2)}x</span>
        </div>
      </div>
      <span className="label-caps">Rasio SROI Agregat</span>
      <div className={`badge ${value>=1?"badge-success":"badge-gray"}`}>
        {value>=1?`+${((value-1)*100).toFixed(0)}% di atas investasi`:"Di bawah threshold"}
      </div>
    </div>
  );
}

// ─── CHART ─────────────────────────────────────────────────────────────────
const CustomTooltip = ({ active, payload, label }) => {
  if (!active||!payload?.length) return null;
  return (
    <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:"10px 14px",fontSize:12,boxShadow:"0 4px 16px rgba(0,0,0,0.1)"}}>
      <p style={{fontWeight:700,marginBottom:6,color:"var(--text-secondary)"}}>{label}</p>
      {payload.map(p=><p key={p.name} style={{color:p.fill}}>{p.name}: <strong>{fmtShort(p.value)}</strong></p>)}
    </div>
  );
};
function OutcomeChart({ records }) {
  const data = records.slice(0,8).map(r=>({ name:(r.sub_program||r.title||"—").slice(0,13), Investasi:getInvest(r), Outcome:getOutcome(r) })).filter(d=>d.Investasi>0||d.Outcome>0);
  if (!data.length) return <div style={{height:160,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-muted)",fontSize:13}}>Belum ada data numerik.</div>;
  return (
    <ResponsiveContainer width="100%" height={175}>
      <BarChart data={data} margin={{top:4,right:8,left:-8,bottom:0}} barGap={3}>
        <XAxis dataKey="name" tick={{fill:"var(--text-muted)",fontSize:10,fontFamily:"var(--font-display)"}} axisLine={false} tickLine={false}/>
        <YAxis tickFormatter={v=>`${(v/1e6).toFixed(0)}jt`} tick={{fill:"var(--text-muted)",fontSize:10}} axisLine={false} tickLine={false}/>
        <Tooltip content={<CustomTooltip/>} cursor={{fill:"var(--surface-alt)"}}/>
        <Bar dataKey="Investasi" fill="#a5b4fc" radius={[4,4,0,0]}/>
        <Bar dataKey="Outcome" fill="var(--accent)" radius={[4,4,0,0]}/>
      </BarChart>
    </ResponsiveContainer>
  );
}

// ─── TOC FLOW ──────────────────────────────────────────────────────────────
function ToCFlow({ record }) {
  const steps = [
    {label:"Baseline",bg:"#dbeafe",tc:"#1e40af",items:[record.kondisi_sebelum_ekonomi,record.kondisi_sebelum_sosial,record.kondisi_sebelum_lingkungan,record.kondisi_sebelum_wellbeing].filter(Boolean)},
    {label:"Output",bg:"#fef9c3",tc:"#713f12",items:[record.output].filter(Boolean)},
    {label:"Outcome",bg:"#dcfce7",tc:"#14532d",items:[record.outcome_ekonomi,record.outcome_sosial,record.outcome_lingkungan,record.outcome_wellbeing].filter(Boolean)},
    {label:"Indikator",bg:"var(--accent-light)",tc:"var(--accent)",items:[record.indikator_ekonomi,record.indikator_sosial,record.indikator_lingkungan,record.indikator_wellbeing].filter(Boolean)},
  ];
  return (
    <div className="grid-4">
      {steps.map((s,i)=>(
        <div key={s.label} style={{position:"relative"}}>
          <div className="toc-box" style={{background:s.bg}}>
            <p style={{fontSize:9,fontWeight:800,letterSpacing:"0.14em",color:s.tc,textTransform:"uppercase",marginBottom:8,fontFamily:"var(--font-display)"}}>{s.label}</p>
            {s.items.length?s.items.map((it,j)=><p key={j} style={{fontSize:11,color:"var(--text-primary)",lineHeight:1.5,marginBottom:4}}>— {it}</p>):<p className="text-muted italic" style={{fontSize:11}}>Belum diisi</p>}
          </div>
          {i<steps.length-1&&<div style={{position:"absolute",right:-10,top:"50%",transform:"translateY(-50%)",zIndex:10}}><IconChevron dir="right" size={16} color="var(--text-muted)"/></div>}
        </div>
      ))}
    </div>
  );
}

// ─── INFO BOX ──────────────────────────────────────────────────────────────
function InfoBox({title,content}) {
  return (
    <div className="info-box">
      <p className="label-caps mb-8">{title}</p>
      <p className="pre" style={{fontSize:12,color:"var(--text-primary)",lineHeight:1.65}}>{content||<span className="text-muted italic">Belum diisi</span>}</p>
    </div>
  );
}

// ─── FORM ──────────────────────────────────────────────────────────────────
function RecordForm({ open, onClose, onSave, initial }) {
  const [form, setForm] = useState(initial||emptyRec());
  const [ontText, setOntText] = useState(JSON.stringify((initial||emptyRec()).ontology,null,2));
  const [tab, setTab] = useState("columns");

  useEffect(()=>{ const b=initial||emptyRec(); setForm(b); setOntText(JSON.stringify(b.ontology,null,2)); },[initial,open]);

  const upd = (k,v) => setForm(p=>({...p,[k]:v}));
  const handleSave = () => {
    let ont; try{ont=JSON.parse(ontText);}catch{alert("JSON ontologi tidak valid.");return;}
    onSave({...form,ontology:ont,updated_at:new Date().toISOString(),title:form.title||form.sub_program||form.program||"Tanpa Judul"});
    onClose();
  };
  if (!open) return null;

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{maxWidth:920}}>
        <div className="modal-header flex items-center justify-between">
          <h2 className="display" style={{fontSize:16,fontWeight:700}}>{initial?"Edit Record":"Tambah Record Baru"}</h2>
          <button className="btn btn-outline btn-sm" onClick={onClose}><IconClose size={13}/>Tutup</button>
        </div>
        <div style={{padding:"14px 26px 0",flexShrink:0}}>
          <div className="tabs-list">
            <button className={`tab-btn ${tab==="columns"?"active":""}`} onClick={()=>setTab("columns")}>40 Kolom</button>
            <button className={`tab-btn ${tab==="ontology"?"active":""}`} onClick={()=>setTab("ontology")}>Ontologi JSON</button>
          </div>
        </div>

        <div className="modal-body">
          {tab==="columns"&&(
            <div className="flex flex-col" style={{gap:16}}>
              <div className="grid-2">
                <div><label className="lbl">Judul / Nama Record</label><input className="inp" value={form.title} onChange={e=>upd("title",e.target.value)} placeholder="Enduro Home Service - Batch 2024"/></div>
                <div><label className="lbl">Row ID Ontologi</label><input className="inp" value={form.ontology?.row_id||""} onChange={e=>{const v=e.target.value;setForm(p=>({...p,ontology:{...p.ontology,row_id:v}}));setOntText(t=>{try{const o=JSON.parse(t);o.row_id=v;return JSON.stringify(o,null,2);}catch{return t;}});}} placeholder="R_PROGRAM_01"/></div>
              </div>
              {groupedColumns.map(({group,columns})=>(
                <Accordion key={group} label={group} defaultOpen={["Identitas","Framing"].includes(group)}>
                  <div className="grid-2">
                    {columns.map(col=>(
                      <div key={col.key}><label className="lbl">{col.label}</label><textarea className="inp" value={form[col.key]||""} onChange={e=>upd(col.key,e.target.value)}/></div>
                    ))}
                  </div>
                </Accordion>
              ))}
            </div>
          )}
          {tab==="ontology"&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 240px",gap:14,height:"60vh"}}>
              <textarea className="inp inp-mono" style={{height:"100%",resize:"none"}} value={ontText} onChange={e=>setOntText(e.target.value)}/>
              <div className="card card-p" style={{height:"fit-content"}}>
                <p className="display" style={{fontSize:13,fontWeight:700,marginBottom:10}}>Panduan Struktur</p>
                <p style={{fontSize:11,color:"var(--text-secondary)",lineHeight:1.7}}>Objek ontologi disimpan bersama record 40 kolom.<br/><br/>Node utama: <code style={{color:"var(--accent)",background:"var(--accent-light)",padding:"1px 4px",borderRadius:4}}>identity, problems, beneficiaries, valuations, notes, column_bindings</code><br/><br/>Setiap node sebaiknya memiliki <code style={{color:"var(--accent)"}}>id</code> unik.</p>
              </div>
            </div>
          )}
        </div>

        <div className="modal-footer flex justify-end gap-8">
          <button className="btn btn-outline" onClick={onClose}>Batal</button>
          <button className="btn btn-primary" onClick={handleSave}><IconSave size={13}/>Simpan</button>
        </div>
      </div>
    </div>
  );
}

// ─── APP ───────────────────────────────────────────────────────────────────
function App() {
  const [records, setRecords] = useState([]);
  const [query, setQuery] = useState("");
  const [selectedId, setSelectedId] = useState(null);
  const [openForm, setOpenForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [detailTab, setDetailTab] = useState("detail");
  const fileRef = useRef();

  useEffect(()=>{
    const raw=localStorage.getItem("tjsl_csv_v3");
    if(raw){try{setRecords(JSON.parse(raw));}catch{setRecords(seedData());}}
    else setRecords(seedData());
  },[]);
  useEffect(()=>{ if(records.length) localStorage.setItem("tjsl_csv_v3",JSON.stringify(records)); },[records]);

  const filtered = useMemo(()=>{
    const q=query.toLowerCase();
    return records.filter(r=>[r.title,r.program,r.sub_program,r.permasalahan,r.penerima_manfaat].join(" ").toLowerCase().includes(q));
  },[records,query]);

  const selected = useMemo(()=>filtered.find(r=>r.id===selectedId)||filtered[0]||null,[filtered,selectedId]);

  const stats = useMemo(()=>{
    const ti=records.reduce((s,r)=>s+getInvest(r),0);
    const to=records.reduce((s,r)=>s+getOutcome(r),0);
    return { totalSubPrograms:records.length, totalInvestment:ti, totalBeneficiaries:records.reduce((s,r)=>s+getBen(r),0), totalOutcomeValue:to, sroi:sroi(to,ti) };
  },[records]);

  useEffect(()=>{
    if(!selectedId&&filtered[0]) setSelectedId(filtered[0].id);
    if(selectedId&&!filtered.some(r=>r.id===selectedId)&&filtered[0]) setSelectedId(filtered[0].id);
  },[filtered,selectedId]);

  const saveRec = p=>{
    setRecords(prev=>prev.some(r=>r.id===p.id)?prev.map(r=>r.id===p.id?p:r):[p,...prev]);
    setSelectedId(p.id);
  };
  const delRec = id=>{
    if(!confirm("Hapus record ini?")) return;
    setRecords(prev=>prev.filter(r=>r.id!==id));
    if(selectedId===id) setSelectedId(null);
  };
  const exportJSON = ()=>{
    const blob=new Blob([JSON.stringify(records,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="tjsl-csv-records.json";a.click();URL.revokeObjectURL(url);
  };
  const importJSON = e=>{
    const f=e.target.files?.[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(!Array.isArray(p))throw 0;setRecords(p);setSelectedId(p[0]?.id||null);}catch{alert("File JSON tidak valid.");}};
    r.readAsText(f);e.target.value="";
  };

  return (
    <div className="flex flex-col" style={{gap:28}}>

      {/* ── HEADER ── */}
      <div className="flex items-end justify-between gap-16 pb-24">
        <div>
          <div className="flex items-center gap-8 mb-6">
            <IconBar size={15} color="var(--accent)"/>
            <span className="label-caps" style={{color:"var(--accent)"}}>Dashboard Kajian</span>
          </div>
          <h1 className="display" style={{fontSize:25,fontWeight:800,letterSpacing:"-0.03em",lineHeight:1.2}}>SROI Analyzer — TJSL CSV</h1>
          <p className="text-secondary mt-6" style={{fontSize:13}}>Kelola 40 kolom data program, ontologi, dan kalkulasi SROI terintegrasi.</p>
        </div>
        <div className="flex gap-8 shrink-0">
          <button className="btn btn-primary" onClick={()=>{setEditing(null);setOpenForm(true);}}><IconPlus size={13}/>Tambah</button>
          <button className="btn btn-outline" onClick={exportJSON}><IconJson size={13}/>Export</button>
          <button className="btn btn-outline" onClick={()=>fileRef.current.click()}><IconDb size={13}/>Import</button>
          <input ref={fileRef} type="file" accept="application/json" style={{display:"none"}} onChange={importJSON}/>
        </div>
      </div>

      {/* ── KPI ROW ── */}
      <div className="grid-5">
        <KpiCard title="Sub Program" value={fmt(stats.totalSubPrograms)} IconC={IconLayers} sub="Total record" delay={0}/>
        <KpiCard title="Total Investasi" value={fmtShort(stats.totalInvestment)} IconC={IconWallet} sub="Akumulasi nominal" delay={1}/>
        <KpiCard title="Penerima Manfaat" value={fmt(stats.totalBeneficiaries)} IconC={IconUsers} sub="Ontologi + kolom" delay={2}/>
        <KpiCard title="Total Outcome" value={fmtShort(stats.totalOutcomeValue)} IconC={IconTarget} sub="Nilai monetisasi final" delay={3} variant="success"/>
        <KpiCard title="SROI Agregat" value={stats.sroi?`${stats.sroi.toFixed(2)}x`:"—"} IconC={IconSigma} sub="Outcome ÷ Investasi" delay={4} variant="accent"/>
      </div>

      {/* ── CHART ROW ── */}
      <div className="grid-chart">
        <div className="card card-p">
          <div className="flex items-center gap-8 mb-12">
            <IconTrend size={14} color="var(--accent)"/>
            <span className="label-caps">Investasi vs Outcome per Sub-Program</span>
          </div>
          <OutcomeChart records={records}/>
          <div className="flex gap-16 mt-8">
            <div className="flex items-center gap-6"><div style={{width:10,height:10,borderRadius:3,background:"#a5b4fc"}}/><span style={{fontSize:10,color:"var(--text-muted)"}}>Investasi</span></div>
            <div className="flex items-center gap-6"><div style={{width:10,height:10,borderRadius:3,background:"var(--accent)"}}/><span style={{fontSize:10,color:"var(--text-muted)"}}>Outcome</span></div>
          </div>
        </div>
        <div className="card flex items-center justify-center">
          <SROIRing value={stats.sroi||0}/>
        </div>
      </div>

      {/* ── MASTER DETAIL ── */}
      <div className="grid-master">

        {/* Sidebar */}
        <div className="card flex flex-col" style={{height:"72vh"}}>
          <div style={{padding:"18px 16px 12px",flexShrink:0}}>
            <p className="label-caps mb-8">Daftar Record</p>
            <div className="relative">
              <div style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)"}}>
                <IconSearch size={13} color="var(--text-muted)"/>
              </div>
              <input className="inp inp-search" value={query} onChange={e=>setQuery(e.target.value)} placeholder="Cari program..."/>
            </div>
          </div>
          <div className="sidebar-scroll">
            {filtered.map(r=>{
              const rv=getOutcome(r),ri=getInvest(r),rs2=sroi(rv,ri);
              const isActive=selected?.id===r.id;
              return (
                <button key={r.id} className={`sidebar-item ${isActive?"active":""}`} onClick={()=>setSelectedId(r.id)} style={{width:"100%"}}>
                  <div className="flex items-start justify-between gap-6">
                    <p className="clamp2" style={{fontSize:12,fontWeight:700,color:isActive?"var(--accent)":"var(--text-primary)",lineHeight:1.4}}>{r.title||r.sub_program||"Tanpa Judul"}</p>
                    {rs2>0&&<span className="display shrink-0" style={{fontSize:11,fontWeight:800,color:"var(--accent)"}}>{rs2.toFixed(1)}x</span>}
                  </div>
                  <p className="truncate mt-4" style={{fontSize:10,color:"var(--text-muted)"}}>{r.program||"—"}</p>
                </button>
              );
            })}
            {!filtered.length&&<p style={{fontSize:12,color:"var(--text-muted)",textAlign:"center",padding:"32px 0"}}>Tidak ada data.</p>}
          </div>
        </div>

        {/* Detail */}
        <div>
          {selected?(
            <div className="flex flex-col" style={{gap:12}}>
              <div className="flex justify-end gap-8">
                <button className="btn btn-outline btn-sm" onClick={()=>{setEditing(selected);setOpenForm(true);}}><IconEdit size={12}/>Edit</button>
                <button className="btn btn-danger btn-sm" onClick={()=>delRec(selected.id)}><IconTrash size={12}/>Hapus</button>
              </div>

              <div className="tabs-list">
                <button className={`tab-btn ${detailTab==="detail"?"active":""}`} onClick={()=>setDetailTab("detail")}>Detail Program</button>
                <button className={`tab-btn ${detailTab==="table"?"active":""}`} onClick={()=>setDetailTab("table")}>Tabel 40 Kolom</button>
              </div>

              {detailTab==="detail"&&<PitchView record={selected} dashboardStats={stats}/>}

              {detailTab==="table"&&(
                <div className="card" style={{padding:20}}>
                  {groupedColumns.map(({group,columns})=>(
                    <Accordion key={group} label={group} defaultOpen={["Identitas","Framing"].includes(group)}>
                      <table className="tbl">
                        <thead><tr><th>Kolom</th><th>Isi</th></tr></thead>
                        <tbody>
                          {columns.map(col=>(
                            <tr key={col.key}>
                              <td>{col.label}</td>
                              <td className="pre">{selected[col.key]||<span className="tbl-empty">Belum diisi</span>}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </Accordion>
                  ))}
                </div>
              )}
            </div>
          ):(
            <div className="card flex flex-col items-center justify-center" style={{height:"72vh",gap:12}}>
              <IconBar size={36} color="var(--border-strong)"/>
              <p className="display" style={{fontSize:15,fontWeight:700,color:"var(--text-secondary)"}}>Belum ada record dipilih</p>
              <p className="text-muted" style={{fontSize:12}}>Tambahkan data pertama untuk mulai.</p>
            </div>
          )}
        </div>
      </div>

      <RecordForm open={openForm} onClose={()=>setOpenForm(false)} onSave={saveRec} initial={editing}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
