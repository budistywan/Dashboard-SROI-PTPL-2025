<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TJSL Ontology CRUD</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #131c31;
      --panel-2: #18233d;
      --panel-3: #223152;
      --text: #eef4ff;
      --muted: #a9b8d6;
      --accent: #60a5fa;
      --accent-2: #34d399;
      --danger: #f87171;
      --warn: #fbbf24;
      --border: #2f436c;
      --chip: #1f2d4b;
      --shadow: 0 10px 30px rgba(0,0,0,.25);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #07101c, #0d1730 30%, #0b1220);
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      display: grid;
      grid-template-columns: 330px 1fr;
      min-height: 100vh;
    }
    aside {
      border-right: 1px solid var(--border);
      background: rgba(8, 14, 28, .6);
      backdrop-filter: blur(10px);
      padding: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    main {
      padding: 18px;
      overflow: auto;
    }
    .brand {
      background: linear-gradient(135deg, #132141, #1a2d58);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .brand h1 { margin: 0 0 8px; font-size: 20px; }
    .brand p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.4; }
    .toolbar, .row-actions, .tabbar, .snippet-controls, .json-actions {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .toolbar { margin-bottom: 14px; }
    button, select, input, textarea {
      font: inherit;
    }
    button {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: .18s ease;
    }
    button:hover { transform: translateY(-1px); background: var(--panel-3); }
    button.primary { background: linear-gradient(135deg, #1d4ed8, #2563eb); border-color: #3b82f6; }
    button.success { background: linear-gradient(135deg, #0f766e, #10b981); border-color: #34d399; }
    button.warn { background: linear-gradient(135deg, #92400e, #d97706); border-color: #f59e0b; }
    button.danger { background: linear-gradient(135deg, #991b1b, #dc2626); border-color: #f87171; }
    button.ghost { background: transparent; }
    .search {
      width: 100%;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .row-list { display: flex; flex-direction: column; gap: 10px; }
    .row-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      cursor: pointer;
    }
    .row-card.active { outline: 2px solid var(--accent); background: #142241; }
    .row-card h3 { margin: 0 0 6px; font-size: 15px; }
    .row-card p { margin: 0 0 10px; color: var(--muted); font-size: 12px; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      background: var(--chip);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--muted);
    }
    .panel {
      background: rgba(19, 28, 49, .75);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .header {
      padding: 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(29, 78, 216, .18), rgba(52, 211, 153, .10));
    }
    .header h2 { margin: 0 0 8px; }
    .header p { margin: 0; color: var(--muted); }
    .tabbar { padding: 12px 18px; border-bottom: 1px solid var(--border); }
    .tabbar button.active { background: var(--panel-3); border-color: var(--accent); }
    .tab-content { padding: 18px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .field label { color: var(--muted); font-size: 12px; }
    .field input, .field textarea, .field select {
      background: #0f1729;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      color: var(--text);
      width: 100%;
    }
    .field textarea { min-height: 100px; resize: vertical; }
    details.section {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      margin-bottom: 12px;
      overflow: hidden;
    }
    details.section > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      background: rgba(255,255,255,.02);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 600;
    }
    details.section > summary::-webkit-details-marker { display: none; }
    .section-body { padding: 16px; border-top: 1px solid var(--border); }
    .item-card {
      background: #0f1729;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .item-card h4 { margin: 0 0 10px; font-size: 14px; display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .small { font-size: 12px; color: var(--muted); }
    .muted { color: var(--muted); }
    .statbar { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-top: 10px; }
    .stat {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }
    .stat .value { font-size: 20px; font-weight: 700; }
    .divider { height: 1px; background: var(--border); margin: 14px 0; }
    .pitch-card {
      background: #0f1729;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .pitch-card h3 { margin: 0 0 10px; }
    .codebox {
      width: 100%; min-height: 240px;
      background: #07101c;
      border: 1px solid var(--border);
      color: #d9e8ff;
      border-radius: 14px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
    }
    .preview {
      background: #0f1729;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .pill { padding: 2px 8px; border-radius: 999px; font-size: 11px; border: 1px solid var(--border); color: var(--muted); }
    .empty { color: var(--muted); padding: 20px; text-align: center; border: 1px dashed var(--border); border-radius: 14px; }
    .footer-note { color: var(--muted); font-size: 12px; margin-top: 14px; }
    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      aside { position: static; height: auto; }
      .grid-2, .grid-3, .statbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <h1>TJSL Ontology CRUD</h1>
        <p>CRUD lokal untuk mengelola data analisis program TJSL berbasis kolom masif + struktur ontologi. Mendukung form, snippet, pitch view, JSON, dan breakdown cell multi-item.</p>
      </div>
      <div class="toolbar">
        <button class="primary" id="addRowBtn">+ Tambah Row</button>
        <button id="duplicateRowBtn">Duplikat</button>
        <button class="danger" id="deleteRowBtn">Hapus</button>
      </div>
      <div class="toolbar">
        <button id="exportAllBtn">Export JSON</button>
        <button id="importAllBtn">Import JSON</button>
        <input type="file" id="importAllFile" accept="application/json" style="display:none" />
      </div>
      <input class="search" id="searchInput" placeholder="Cari program / sub-program / lokasi" />
      <div class="row-list" id="rowList"></div>
    </aside>

    <main>
      <div class="panel" id="mainPanel">
        <div class="header">
          <h2 id="headerTitle">Belum ada row dipilih</h2>
          <p id="headerSubtitle">Tambah atau pilih row di panel kiri.</p>
          <div class="statbar">
            <div class="stat"><div class="small">Program</div><div class="value" id="statProgram">-</div></div>
            <div class="stat"><div class="small">Sub-Program</div><div class="value" id="statSubProgram">-</div></div>
            <div class="stat"><div class="small">Status</div><div class="value" id="statStatus">-</div></div>
            <div class="stat"><div class="small">Kelengkapan</div><div class="value" id="statCompleteness">0%</div></div>
          </div>
        </div>
        <div class="tabbar">
          <button data-tab="form" class="active">Form</button>
          <button data-tab="snippet">Snippet</button>
          <button data-tab="pitch">Pitch</button>
          <button data-tab="json">JSON</button>
        </div>
        <div class="tab-content" id="tabContent"></div>
      </div>
    </main>
  </div>

  <script>
    const STORAGE_KEY = 'tjsl-ontology-crud-v1';
    const appState = {
      rows: [],
      selectedId: null,
      activeTab: 'form'
    };

    const FIELD_SCHEMA = {
      identity: [
        { key: 'cdo_name', label: 'Kolom 1 — Nama CDO', type: 'text' },
        { key: 'unit_kerja', label: 'Kolom 2 — Unit Kerja', type: 'text' },
        { key: 'lokasi', label: 'Kolom 3 — Lokasi Pelaksanaan', type: 'text' },
        { key: 'program', label: 'Kolom 5 — Program', type: 'text' },
        { key: 'sub_program', label: 'Kolom 6 — Sub-Program', type: 'text' }
      ],
      multi: {
        problems: { label: 'Kolom 4 — Permasalahan', itemLabel: 'Problem', fields: [
          { key: 'id', label: 'ID', type: 'text' },
          { key: 'title', label: 'Judul', type: 'text' },
          { key: 'dimension', label: 'Dimensi', type: 'select', options: ['economic','social','environmental','well_being','general'] },
          { key: 'description', label: 'Deskripsi', type: 'textarea' },
          { key: 'normative_basis', label: 'Dasar Normatif (pisahkan dengan ;)', type: 'text' },
          { key: 'evidence_basis', label: 'Basis Evidensi (pisahkan dengan ;)', type: 'text' }
        ]},
        activities: { label: 'Kolom 7–9 — Kegiatan', itemLabel: 'Kegiatan', fields: [
          { key: 'id', label: 'ID', type: 'text' },
          { key: 'year', label: 'Tahun', type: 'text' },
          { key: 'form', label: 'Bentuk', type: 'text' },
          { key: 'title', label: 'Judul', type: 'text' },
          { key: 'description', label: 'Uraian', type: 'textarea' },
          { key: 'addresses_problem_ids', label: 'Referensi Problem IDs (pisahkan dengan koma)', type: 'text' }
        ]},
        stakeholders: { label: 'Kolom 10–11 — Stakeholder', itemLabel: 'Stakeholder', fields: [
          { key: 'id', label: 'ID', type: 'text' },
          { key: 'name', label: 'Nama', type: 'text' },
          { key: 'jenis', label: 'Jenis', type: 'text' },
          { key: 'role', label: 'Peran', type: 'textarea' },
          { key: 'related_activity_ids', label: 'Referensi Activity IDs (pisahkan dengan koma)', type: 'text' }
        ]},
        investments: { label: 'Kolom 12–14 — Investasi', itemLabel: 'Investasi', fields: [
          { key: 'id', label: 'ID', type: 'text' },
          { key: 'year', label: 'Tahun', type: 'text' },
          { key: 'form', label: 'Bentuk', type: 'text' },
          { key: 'amount', label: 'Nominal', type: 'number' },
          { key: 'currency', label: 'Mata Uang', type: 'text' },
          { key: 'description', label: 'Deskripsi', type: 'textarea' },
          { key: 'related_activity_ids', label: 'Referensi Activity IDs (pisahkan dengan koma)', type: 'text' }
        ]},
        beneficiaries: { label: 'Kolom 15 — Penerima Manfaat', itemLabel: 'Penerima Manfaat', fields: [
          { key: 'id', label: 'ID', type: 'text' },
          { key: 'name', label: 'Nama', type: 'text' },
          { key: 'type', label: 'Tipe', type: 'select', options: ['direct','indirect'] },
          { key: 'count', label: 'Jumlah', type: 'number' },
          { key: 'unit', label: 'Satuan', type: 'text' },
          { key: 'description', label: 'Deskripsi', type: 'textarea' }
        ]},
        outputs: { label: 'Kolom 16 — Output', itemLabel: 'Output', fields: [
          { key: 'id', label: 'ID', type: 'text' },
          { key: 'title', label: 'Judul', type: 'text' },
          { key: 'description', label: 'Deskripsi', type: 'textarea' },
          { key: 'related_activity_ids', label: 'Referensi Activity IDs (pisahkan dengan koma)', type: 'text' },
          { key: 'target_beneficiary_ids', label: 'Referensi Beneficiary IDs (pisahkan dengan koma)', type: 'text' }
        ]},
        indicators: { label: 'Kolom 25–28 — Indikator Kuantitatif', itemLabel: 'Indikator', fields: [
          { key: 'id', label: 'ID', type: 'text' },
          { key: 'dimension', label: 'Dimensi', type: 'select', options: ['economic','social','environmental','well_being'] },
          { key: 'title', label: 'Judul', type: 'text' },
          { key: 'description', label: 'Deskripsi', type: 'textarea' },
          { key: 'unit', label: 'Unit', type: 'text' },
          { key: 'measurement_method', label: 'Metode Pengukuran', type: 'text' },
          { key: 'related_outcome_id', label: 'Referensi Outcome ID', type: 'text' }
        ]},
        valuations: { label: 'Kolom 29–32 — Monetisasi Sebelum Fiksasi', itemLabel: 'Monetisasi', fields: [
          { key: 'id', label: 'ID', type: 'text' },
          { key: 'aspect', label: 'Aspek', type: 'text' },
          { key: 'related_indicator_id', label: 'Referensi Indicator ID', type: 'text' },
          { key: 'proxy_label', label: 'Label Proksi', type: 'text' },
          { key: 'proxy_value', label: 'Nilai Proksi', type: 'number' },
          { key: 'beneficiary_count', label: 'Jumlah Penerima Manfaat', type: 'number' },
          { key: 'value_2022', label: '2022', type: 'number' },
          { key: 'value_2023', label: '2023', type: 'number' },
          { key: 'value_2024', label: '2024', type: 'number' },
          { key: 'calculation_logic', label: 'Logika Hitung', type: 'textarea' }
        ]},
        final_values: { label: 'Kolom 41–44 — Nilai Setelah Fiksasi', itemLabel: 'Nilai Akhir', fields: [
          { key: 'id', label: 'ID', type: 'text' },
          { key: 'aspect', label: 'Aspek', type: 'text' },
          { key: 'source_monetisation_id', label: 'Referensi Monetisasi ID', type: 'text' },
          { key: 'value_2022', label: '2022', type: 'number' },
          { key: 'value_2023', label: '2023', type: 'number' },
          { key: 'value_2024', label: '2024', type: 'number' },
          { key: 'calculation_logic', label: 'Logika Hitung', type: 'textarea' }
        ]},
        notes: { label: 'Catatan / Informasi Umum Tambahan', itemLabel: 'Catatan', fields: [
          { key: 'id', label: 'ID', type: 'text' },
          { key: 'type', label: 'Tipe', type: 'text' },
          { key: 'text', label: 'Isi Catatan', type: 'textarea' }
        ]}
      },
      rich: [
        { key: 'baseline_economic', label: 'Kolom 17 — Kondisi Sebelum Program (Ekonomi)' },
        { key: 'baseline_social', label: 'Kolom 18 — Kondisi Sebelum Program (Sosial)' },
        { key: 'baseline_environmental', label: 'Kolom 19 — Kondisi Sebelum Program (Lingkungan)' },
        { key: 'baseline_well_being', label: 'Kolom 20 — Kondisi Sebelum Program (Well-Being)' },
        { key: 'outcome_economic', label: 'Kolom 21 — Outcome (Ekonomi)' },
        { key: 'outcome_social', label: 'Kolom 22 — Outcome (Sosial)' },
        { key: 'outcome_environmental', label: 'Kolom 23 — Outcome (Lingkungan)' },
        { key: 'outcome_well_being', label: 'Kolom 24 — Outcome (Well-Being)' },
        { key: 'info_umum', label: 'Kolom 45 — Informasi Umum' }
      ],
      adjustmentTypes: [
        { type: 'deadweight', label: 'Kolom 33–34 — Deadweight' },
        { type: 'displacement', label: 'Kolom 35–36 — Displacement' },
        { type: 'attribution', label: 'Kolom 37–38 — Attribution' },
        { type: 'drop_off', label: 'Kolom 39–40 — Drop-off' }
      ]
    };

    function uid(prefix='ID') { return `${prefix}_${Math.random().toString(36).slice(2, 8)}`.toUpperCase(); }

    function defaultRow() {
      return {
        id: uid('ROW'),
        meta: {
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString(),
          status: 'draft',
          version: 1,
          tags: []
        },
        columns: {},
        ontology: {
          identity: { cdo_name: '', unit_kerja: '', lokasi: '', program: '', sub_program: '' },
          problems: [], activities: [], stakeholders: [], investments: [], beneficiaries: [], outputs: [],
          baselines: [], outcomes: [], indicators: [], valuations: [], impact_adjustments: [], final_values: [], notes: [],
          column_bindings: {}
        },
        ui_state: { expanded_sections: {}, last_edit_mode: 'form' }
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ rows: appState.rows, selectedId: appState.selectedId }));
    }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        const row = defaultRow();
        appState.rows = [row];
        appState.selectedId = row.id;
        saveState();
        return;
      }
      try {
        const parsed = JSON.parse(raw);
        appState.rows = parsed.rows || [];
        appState.selectedId = parsed.selectedId || (appState.rows[0]?.id ?? null);
        if (!appState.rows.length) {
          const row = defaultRow();
          appState.rows = [row];
          appState.selectedId = row.id;
        }
      } catch {
        const row = defaultRow();
        appState.rows = [row];
        appState.selectedId = row.id;
      }
    }

    function getSelectedRow() {
      return appState.rows.find(r => r.id === appState.selectedId) || null;
    }

    function touch(row) {
      row.meta.updated_at = new Date().toISOString();
      syncColumnsFromOntology(row);
      saveState();
      renderAll();
    }

    function splitList(v) {
      if (Array.isArray(v)) return v;
      return String(v || '').split(/[;,]/).map(s => s.trim()).filter(Boolean);
    }

    function formatMoney(v) {
      if (v === null || v === undefined || v === '') return '-';
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(Number(v) || 0);
    }

    function syncColumnsFromOntology(row) {
      const o = row.ontology;
      const c = row.columns;
      c.col_1_nama_cdo = o.identity.cdo_name || '';
      c.col_2_unit_kerja = o.identity.unit_kerja || '';
      c.col_3_lokasi_pelaksanaan = o.identity.lokasi || '';
      c.col_5_program = o.identity.program || '';
      c.col_6_sub_program = o.identity.sub_program || '';
      c.col_4_permasalahan = o.problems.map(p => ({ id: p.id, title: p.title || '', description: p.description || '' }));
      c.col_7_kegiatan_tahun = o.activities.map(a => ({ id: a.id, year: a.year || '' }));
      c.col_8_kegiatan_bentuk = o.activities.map(a => ({ id: a.id, form: a.form || '' }));
      c.col_9_kegiatan_uraian = o.activities.map(a => ({ id: a.id, description: a.description || '' }));
      c.col_10_stakeholder_jenis = o.stakeholders.map(s => ({ id: s.id, jenis: s.jenis || '' }));
      c.col_11_stakeholder_peran = o.stakeholders.map(s => ({ id: s.id, role: s.role || '' }));
      c.col_12_investasi_tahun = o.investments.map(i => ({ id: i.id, year: i.year || '' }));
      c.col_13_investasi_bentuk = o.investments.map(i => ({ id: i.id, form: i.form || '' }));
      c.col_14_investasi_nominal = o.investments.map(i => ({ id: i.id, amount: i.amount ?? null }));
      c.col_15_penerima_manfaat = o.beneficiaries.map(b => ({ id: b.id, name: b.name || '', count: b.count ?? null }));
      c.col_16_output = o.outputs.map(out => ({ id: out.id, title: out.title || '', description: out.description || '' }));
      c.col_17_kondisi_sebelum_ekonomi = o.baselines.find(x => x.dimension === 'economic')?.description || '';
      c.col_18_kondisi_sebelum_sosial = o.baselines.find(x => x.dimension === 'social')?.description || '';
      c.col_19_kondisi_sebelum_lingkungan = o.baselines.find(x => x.dimension === 'environmental')?.description || '';
      c.col_20_kondisi_sebelum_well_being = o.baselines.find(x => x.dimension === 'well_being')?.description || '';
      c.col_21_outcome_ekonomi = o.outcomes.find(x => x.dimension === 'economic')?.description || '';
      c.col_22_outcome_sosial = o.outcomes.find(x => x.dimension === 'social')?.description || '';
      c.col_23_outcome_lingkungan = o.outcomes.find(x => x.dimension === 'environmental')?.description || '';
      c.col_24_outcome_well_being = o.outcomes.find(x => x.dimension === 'well_being')?.description || '';
      c.col_25_indikator_ekonomi = o.indicators.filter(x => x.dimension === 'economic');
      c.col_26_indikator_sosial = o.indicators.filter(x => x.dimension === 'social');
      c.col_27_indikator_lingkungan = o.indicators.filter(x => x.dimension === 'environmental');
      c.col_28_indikator_well_being = o.indicators.filter(x => x.dimension === 'well_being');
      c.col_29_monetisasi_sebelum_fiksasi_aspek = o.valuations.map(v => ({ id: v.id, aspect: v.aspect }));
      c.col_30_monetisasi_sebelum_fiksasi_2022 = o.valuations.map(v => ({ id: v.id, value_2022: v.value_2022 ?? null }));
      c.col_31_monetisasi_sebelum_fiksasi_2023 = o.valuations.map(v => ({ id: v.id, value_2023: v.value_2023 ?? null }));
      c.col_32_monetisasi_sebelum_fiksasi_2024 = o.valuations.map(v => ({ id: v.id, value_2024: v.value_2024 ?? null }));
      const adj = Object.fromEntries((o.impact_adjustments || []).map(a => [a.type, a]));
      c.col_33_justifikasi_deadweight = adj.deadweight?.justification_points || [];
      c.col_34_nilai_deadweight = adj.deadweight?.final_value ?? '';
      c.col_35_justifikasi_displacement = adj.displacement?.justification_points || [];
      c.col_36_nilai_displacement = adj.displacement?.final_value ?? '';
      c.col_37_justifikasi_attribution = adj.attribution?.justification_points || [];
      c.col_38_nilai_attribution = adj.attribution?.final_value ?? '';
      c.col_39_justifikasi_drop_off = adj.drop_off?.justification_points || [];
      c.col_40_nilai_drop_off = adj.drop_off?.final_value ?? '';
      c.col_41_nilai_setelah_fiksasi_aspek = o.final_values.map(v => ({ id: v.id, aspect: v.aspect }));
      c.col_42_nilai_setelah_fiksasi_2022 = o.final_values.map(v => ({ id: v.id, value_2022: v.value_2022 ?? null }));
      c.col_43_nilai_setelah_fiksasi_2023 = o.final_values.map(v => ({ id: v.id, value_2023: v.value_2023 ?? null }));
      c.col_44_nilai_setelah_fiksasi_2024 = o.final_values.map(v => ({ id: v.id, value_2024: v.value_2024 ?? null }));
      c.col_45_informasi_umum = o.notes.map(n => n.text).join('\n\n');
      row.ontology.column_bindings = {
        4: o.problems.map(x => x.id), 7: o.activities.map(x => x.id), 8: o.activities.map(x => x.id), 9: o.activities.map(x => x.id),
        10: o.stakeholders.map(x => x.id), 11: o.stakeholders.map(x => x.id), 12: o.investments.map(x => x.id), 13: o.investments.map(x => x.id), 14: o.investments.map(x => x.id),
        15: o.beneficiaries.map(x => x.id), 16: o.outputs.map(x => x.id), 25: o.indicators.filter(x=>x.dimension==='economic').map(x=>x.id), 26: o.indicators.filter(x=>x.dimension==='social').map(x=>x.id),
        27: o.indicators.filter(x=>x.dimension==='environmental').map(x=>x.id), 28: o.indicators.filter(x=>x.dimension==='well_being').map(x=>x.id),
        29: o.valuations.map(x=>x.id), 33: adj.deadweight ? [adj.deadweight.id] : [], 35: adj.displacement ? [adj.displacement.id] : [],
        37: adj.attribution ? [adj.attribution.id] : [], 39: adj.drop_off ? [adj.drop_off.id] : [], 41: o.final_values.map(x=>x.id)
      };
    }

    function computeCompleteness(row) {
      const o = row.ontology;
      const checks = [
        !!o.identity.program, !!o.identity.sub_program, !!o.identity.unit_kerja,
        o.problems.length > 0, o.activities.length > 0, o.stakeholders.length > 0,
        o.investments.length > 0, o.beneficiaries.length > 0, o.outputs.length > 0,
        o.baselines.length >= 1, o.outcomes.length >= 1, o.indicators.length >= 1,
        o.valuations.length >= 1, o.impact_adjustments.length >= 1, o.final_values.length >= 1
      ];
      return Math.round((checks.filter(Boolean).length / checks.length) * 100);
    }

    function autoRecalculateFinalValues(row) {
      const o = row.ontology;
      const dw = Number(o.impact_adjustments.find(x=>x.type==='deadweight')?.final_value || 0);
      const ds = Number(o.impact_adjustments.find(x=>x.type==='displacement')?.final_value || 0);
      const at = Number(o.impact_adjustments.find(x=>x.type==='attribution')?.final_value || 0);
      const dr = Number(o.impact_adjustments.find(x=>x.type==='drop_off')?.final_value || 0);
      const factor = (1-dw)*(1-ds)*(1-at);
      o.final_values = o.valuations.map(v => ({
        id: v.id.replace(/^M/i, 'FV'),
        aspect: v.aspect,
        source_monetisation_id: v.id,
        value_2022: numOrNull(v.value_2022, factor, dr, 0),
        value_2023: numOrNull(v.value_2023, factor, dr, 1),
        value_2024: numOrNull(v.value_2024, factor, dr, 2),
        calculation_logic: `gross × (1-${dw}) × (1-${ds}) × (1-${at}); tahun berikutnya × (1-${dr})`
      }));
    }

    function numOrNull(base, factor, drop, yearsAfter) {
      if (base === null || base === undefined || base === '') return null;
      return Math.round(Number(base) * factor * Math.pow(1-drop, yearsAfter));
    }

    function renderSnippet(container, row) {
      container.innerHTML = `
        <div class="field"><label>Paste snippet JSON partial</label><textarea id="snippetInput" class="codebox" style="min-height:280px"></textarea></div>
        <div class="snippet-controls">
          <select id="snippetMode">
            <option value="merge_by_id">merge_by_id</option>
            <option value="append">append</option>
            <option value="replace">replace</option>
          </select>
          <button id="previewSnippetBtn">Preview</button>
          <button id="applySnippetBtn" class="success">Apply</button>
        </div>
        <div class="preview" id="snippetPreview">Preview akan muncul di sini.</div>
        <div class="footer-note">Snippet mendukung partial update pada identity, problems, activities, stakeholders, investments, beneficiaries, outputs, baselines, outcomes, indicators, valuations, impact_adjustments, final_values, notes.</div>
      `;
      const input = container.querySelector('#snippetInput');
      const preview = container.querySelector('#snippetPreview');
      container.querySelector('#previewSnippetBtn').onclick = () => {
        preview.textContent = buildSnippetPreview(row, input.value, container.querySelector('#snippetMode').value);
      };
      container.querySelector('#applySnippetBtn').onclick = () => {
        try {
          applySnippet(row, JSON.parse(input.value || '{}'), container.querySelector('#snippetMode').value);
          preview.textContent = 'Snippet berhasil diterapkan.';
          touch(row);
        } catch (e) {
          preview.textContent = 'Gagal memproses snippet: ' + e.message;
        }
      };
    }

    function buildSnippetPreview(row, raw, mode) {
      try {
        const data = JSON.parse(raw || '{}');
        const sections = Object.keys(data).filter(k => k !== 'row_id');
        if (!sections.length) return 'Tidak ada section yang terdeteksi.';
        const lines = [`Mode: ${mode}`, `Target row: ${row.id}`, 'Sections:'];
        sections.forEach(sec => {
          const current = row.ontology[sec];
          const incoming = data[sec];
          if (Array.isArray(current) && Array.isArray(incoming)) {
            lines.push(`- ${sec}: current ${current.length} item → incoming ${incoming.length} item`);
          } else if (typeof current === 'object' && typeof incoming === 'object') {
            lines.push(`- ${sec}: object patch`);
          } else {
            lines.push(`- ${sec}: scalar patch`);
          }
        });
        return lines.join('\n');
      } catch (e) {
        return 'JSON tidak valid: ' + e.message;
      }
    }

    function applySnippet(row, data, mode) {
      const allowed = ['identity','problems','activities','stakeholders','investments','beneficiaries','outputs','baselines','outcomes','indicators','valuations','impact_adjustments','final_values','notes'];
      allowed.forEach(sec => {
        if (!(sec in data)) return;
        const incoming = data[sec];
        if (sec === 'identity' && typeof incoming === 'object' && !Array.isArray(incoming)) {
          row.ontology.identity = { ...row.ontology.identity, ...incoming };
          return;
        }
        if (!Array.isArray(incoming)) return;
        if (!Array.isArray(row.ontology[sec])) row.ontology[sec] = [];
        if (mode === 'replace') {
          row.ontology[sec] = incoming;
        } else if (mode === 'append') {
          row.ontology[sec].push(...incoming);
        } else if (mode === 'merge_by_id') {
          incoming.forEach(item => {
            const idx = row.ontology[sec].findIndex(x => x.id && item.id && x.id === item.id);
            if (idx >= 0) row.ontology[sec][idx] = { ...row.ontology[sec][idx], ...item };
            else row.ontology[sec].push(item);
          });
        }
      });
      autoRecalculateFinalValues(row);
    }

    function renderPitchList(items, keys) {
      if (!items?.length) return '<div class="empty">Belum ada data.</div>';
      return items.map(it => `<div class="pitch-card">${keys.map(k => `<div><span class="small">${escapeHtml(k)}</span><div>${formatPitchValue(it[k])}</div></div>`).join('<div class="divider"></div>')}</div>`).join('');
    }

    function renderPitchBaselineOutcome(items) {
      if (!items?.length) return '<div class="empty">Belum ada data.</div>';
      return items.map(it => `<div class="pitch-card"><div class="chips"><span class="chip">${escapeHtml(it.id || '-')}</span><span class="chip">${escapeHtml(it.dimension || '-')}</span></div><div class="divider"></div><div>${escapeHtml(it.description || '-')}</div></div>`).join('');
    }

    function renderPitchAdjustments(items) {
      if (!items?.length) return '<div class="empty">Belum ada data.</div>';
      return items.map(it => `<div class="pitch-card"><h3>${escapeHtml(it.type)}</h3><div class="small">Nilai</div><div>${it.final_value === '' ? '-' : it.final_value}</div><div class="divider"></div>${(it.justification_points || []).length ? '<ul>' + it.justification_points.map(p => `<li>${escapeHtml(p)}</li>`).join('') + '</ul>' : '<div class="muted">Belum ada justifikasi.</div>'}</div>`).join('');
    }

    function renderPitchNotes(items) {
      if (!items?.length) return '<div class="empty">Belum ada catatan.</div>';
      return items.map(it => `<div class="pitch-card"><div class="small">${escapeHtml(it.type || 'note')}</div><div>${escapeHtml(it.text || '')}</div></div>`).join('');
    }

    function formatPitchValue(v) {
      if (v === null || v === undefined || v === '') return '-';
      if (Array.isArray(v)) return escapeHtml(v.join(', '));
      if (typeof v === 'number' && String(v).length >= 4) return formatMoney(v);
      return escapeHtml(String(v));
    }

    function renderJson(container, row) {
      container.innerHTML = `
        <div class="json-actions">
          <button id="copyJsonBtn">Copy JSON Row</button>
          <button id="downloadRowBtn">Download JSON Row</button>
        </div>
        <textarea class="codebox" id="jsonBox">${escapeHtml(JSON.stringify(row, null, 2))}</textarea>
        <div class="footer-note">Mode ini menampilkan seluruh row, termasuk meta, columns, ontology, dan ui_state.</div>
      `;
      container.querySelector('#copyJsonBtn').onclick = async () => {
        await navigator.clipboard.writeText(container.querySelector('#jsonBox').value);
      };
      container.querySelector('#downloadRowBtn').onclick = () => downloadJson(`${row.id}.json`, row);
    }

    function defaultItemForSection(sectionName) {
      const map = {
        problems: { id: uid('P'), title: '', dimension: 'general', description: '', normative_basis: [], evidence_basis: [] },
        activities: { id: uid('A'), year: '', form: '', title: '', description: '', addresses_problem_ids: [] },
        stakeholders: { id: uid('S'), name: '', jenis: '', role: '', related_activity_ids: [] },
        investments: { id: uid('INV'), year: '', form: '', amount: null, currency: 'IDR', description: '', related_activity_ids: [] },
        beneficiaries: { id: uid('B'), name: '', type: 'direct', count: null, unit: 'orang', description: '' },
        outputs: { id: uid('O'), title: '', description: '', related_activity_ids: [], target_beneficiary_ids: [] },
        indicators: { id: uid('I'), dimension: 'economic', title: '', description: '', unit: '', measurement_method: '', related_outcome_id: '' },
        valuations: { id: uid('M'), aspect: '', related_indicator_id: '', proxy_label: '', proxy_value: null, beneficiary_count: null, value_2022: null, value_2023: null, value_2024: null, calculation_logic: '' },
        final_values: { id: uid('FV'), aspect: '', source_monetisation_id: '', value_2022: null, value_2023: null, value_2024: null, calculation_logic: '' },
        notes: { id: uid('N'), type: 'general', text: '' }
      };
      return structuredClone(map[sectionName]);
    }

    function moveItem(arr, idx, dir, row) {
      const n = idx + dir;
      if (n < 0 || n >= arr.length) return;
      [arr[idx], arr[n]] = [arr[n], arr[idx]];
      touch(row);
    }

    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, s => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[s]));
    }
    function escapeAttr(str) { return escapeHtml(str); }

    function downloadJson(name, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = name; a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('addRowBtn').onclick = () => {
      const row = defaultRow();
      appState.rows.unshift(row);
      appState.selectedId = row.id;
      saveState(); renderAll();
    };
    document.getElementById('duplicateRowBtn').onclick = () => {
      const row = getSelectedRow(); if (!row) return;
      const copy = structuredClone(row); copy.id = uid('ROW'); copy.meta.created_at = new Date().toISOString(); copy.meta.updated_at = copy.meta.created_at; copy.meta.version = 1;
      appState.rows.unshift(copy); appState.selectedId = copy.id; saveState(); renderAll();
    };
    document.getElementById('deleteRowBtn').onclick = () => {
      const row = getSelectedRow(); if (!row) return;
      if (!confirm(`Hapus row ${row.id}?`)) return;
      appState.rows = appState.rows.filter(r => r.id !== row.id);
      appState.selectedId = appState.rows[0]?.id || null;
      if (!appState.rows.length) { const fresh = defaultRow(); appState.rows = [fresh]; appState.selectedId = fresh.id; }
      saveState(); renderAll();
    };
    document.getElementById('exportAllBtn').onclick = () => downloadJson('tjsl_ontology_rows.json', appState.rows);
    document.getElementById('importAllBtn').onclick = () => document.getElementById('importAllFile').click();
    document.getElementById('importAllFile').addEventListener('change', async (e) => {
      const file = e.target.files[0]; if (!file) return;
      const text = await file.text();
      try {
        const data = JSON.parse(text);
        if (!Array.isArray(data)) throw new Error('File harus berupa array rows');
        appState.rows = data; appState.selectedId = data[0]?.id || null; saveState(); renderAll();
      } catch (err) { alert('Import gagal: ' + err.message); }
      e.target.value = '';
    });
    document.getElementById('searchInput').addEventListener('input', renderRowList);
    document.querySelectorAll('.tabbar button').forEach(btn => btn.onclick = () => { appState.activeTab = btn.dataset.tab; renderTab(); });

    loadState();
    appState.rows.forEach(syncColumnsFromOntology);
    renderAll();
  </script>
</body>
</html>
