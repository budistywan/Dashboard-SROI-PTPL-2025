<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TJSL EHS - Ontology Driven v6</title>
<style>
:root{--bg:#eef2f7;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#dbe4ee;--primary:#0f172a;--soft:#f8fafc;--shadow:0 8px 24px rgba(15,23,42,.06)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
button,input,textarea,select{font:inherit}.hidden{display:none!important}
.container{max-width:1500px;margin:0 auto;padding:24px}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px}
h1{margin:0;font-size:32px;line-height:1.1}.subtitle{margin:8px 0 0;color:var(--muted);font-size:15px}
.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#fff;color:var(--text);padding:12px 16px;border-radius:16px;cursor:pointer;font-weight:700}.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px}.select,.search{border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px 14px}.search{min-width:300px}
.stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:16px;margin-bottom:22px}.stat{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:var(--shadow)}.stat .k{font-size:13px;color:var(--muted);margin-bottom:10px}.stat .v{font-size:30px;font-weight:800}
.main{display:grid;grid-template-columns:330px 1fr;gap:22px}.panel{background:var(--card);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}
.side{padding:18px}.side h2{margin:0 0 14px;font-size:20px}.list{display:flex;flex-direction:column;gap:12px;max-height:70vh;overflow:auto}.item{border:1px solid var(--line);border-radius:18px;padding:14px;cursor:pointer}.item.active{background:var(--primary);color:#fff;border-color:var(--primary)}.item .meta{font-size:12px;color:inherit;opacity:.82;margin-top:6px}
.detail{padding:18px}.hero{border:1px solid var(--line);border-radius:24px;padding:18px;background:linear-gradient(135deg,#f8fafc,#fff)}.hero h2{margin:0 0 10px;font-size:28px}.badges{display:flex;gap:8px;flex-wrap:wrap}.badge{display:inline-block;border:1px solid var(--line);padding:6px 10px;border-radius:999px;font-size:12px;background:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.section{margin-top:14px;border:1px solid var(--line);border-radius:24px;overflow:hidden;background:#fff}.section summary{cursor:pointer;list-style:none;padding:16px 18px;font-weight:800;display:flex;justify-content:space-between;align-items:center}.section summary::-webkit-details-marker{display:none}.section .body{padding:0 18px 18px}
.agg{border:1px solid var(--line);border-radius:20px;padding:14px;background:#fff}.agghead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.aggtitle{font-size:18px;font-weight:800}.aggvalue{font-size:24px;font-weight:800}.muted{color:var(--muted)}
.breaklist{display:flex;flex-direction:column;gap:10px;margin-top:12px}.breakitem{border:1px solid var(--line);border-radius:16px;padding:12px;background:var(--soft)}.breakrow{display:flex;justify-content:space-between;gap:10px}.subdetails{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
pre.json{margin:0;background:#020617;color:#e2e8f0;padding:16px;border-radius:18px;overflow:auto;font-size:12px;line-height:1.55}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:20px}.modal.open{display:flex}.modalcard{width:min(1100px,100%);height:min(90vh,900px);background:#fff;border-radius:28px;border:1px solid var(--line);box-shadow:var(--shadow);display:flex;flex-direction:column}.modalhead{padding:18px 20px 0;display:flex;justify-content:space-between;gap:10px}.modalbody{padding:16px 20px 0;flex:1}.modalfoot{padding:16px 20px 20px;display:flex;justify-content:flex-end;gap:10px}.field{display:flex;flex-direction:column;gap:8px}.field textarea,.field input{border:1px solid var(--line);border-radius:16px;padding:12px 14px;width:100%}.field textarea{height:100%;min-height:500px;resize:vertical;font-family:ui-monospace,monospace;font-size:12px}
@media (max-width:1200px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.main{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
@media (max-width:720px){.container{padding:16px}.stats{grid-template-columns:1fr}.search{min-width:unset;width:100%}h1{font-size:26px}}
</style>
</head>

    <div>
      <h1>TJSL EHS – Ontology Driven</h1>
      <div class="subtitle">Versi ini dibangun ulang agar stabil: agregat + breakdown untuk investasi, penerima manfaat, dan nilai dampak.</div>
    </div>
    <div class="actions">
      <button class="btn primary" id="btnEdit">Edit JSON</button>

      <input id="importFile" class="hidden" type="file" accept="application/json" />
    </div>
  </div>

    <span class="muted">Tahun dashboard:</span>
    <select id="yearSelect" class="select">

      <option selected>2024</option>
      <option>2025</option>
    </select>
    <input id="searchInput" class="search" placeholder="Cari ontology / program / sub-program..." />

  <div class="stats" id="stats"></div>

  <div class="main">
    <div class="panel side">
      <h2>Daftar Ontology</h2>
      <div class="list" id="recordList"></div>
    </div>
    <div class="panel detail" id="detail"></div>
  </div>
</div>

<div class="modal" id="editModal">

    </div>
    <div class="modalbody">
      <div class="field">
        <label for="jsonEditor">JSON</label>
        <textarea id="jsonEditor"></textarea>
      </div>
    </div>
    <div class="modalfoot">
      <button class="btn" id="btnCancel">Batal</button>
      <button class="btn primary" id="btnSave">Simpan</button>
    </div>
  </div>
</div>

function initRecords(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{ records = JSON.parse(raw); }
    catch{ records = [{id:'rec_ehs', title:'Contoh – Enduro Home Service', ontology:seedOntology}]; }
  } else {
    records = [{id:'rec_ehs', title:'Contoh – Enduro Home Service', ontology:seedOntology}];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }
  selectedId = records[0]?.id || null;
}
function persist(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }
function filteredRecords(){
  const q = searchTerm.trim().toLowerCase();
  return records.filter(r => [r.title, r.ontology?.ontology_meta?.ontology_id, r.ontology?.identity?.program, r.ontology?.identity?.sub_program].join(' ').toLowerCase().includes(q));
}
function selectedRecord(){
  const arr = filteredRecords();
  return arr.find(r => r.id === selectedId) || arr[0] || null;
}
function renderStats(){
  const totalSubPrograms = records.length;
  const totalInvestment = records.reduce((s,r)=>{ const a=(r.ontology.investment_aggregates||[]).find(x=>String(x.year)===dashboardYear&&x.display_as_primary_summary); return s + (a?toNumber(a.amount_idr):0); },0);
  const totalBeneficiaries = records.reduce((s,r)=>{ const a=(r.ontology.beneficiary_aggregates||[]).find(x=>x.display_as_primary_summary); return s + (a?toNumber(a.count):0); },0);
  const totalOutcome = records.reduce((s,r)=>{ const a=(r.ontology.final_value_aggregates||[]).find(x=>String(x.year)===dashboardYear&&x.display_as_primary_summary); return s + (a?toNumber(a.amount_idr):0); },0);
  const sroi = totalInvestment ? totalOutcome/totalInvestment : 0;
  const data = [
    ['Jumlah Sub Program', formatNumber(totalSubPrograms), 'Total ontology/sub-program'],
    [`Total Investasi ${dashboardYear}`, formatCurrency(totalInvestment), 'Membaca investment_aggregates'],
    ['Total Penerima Manfaat', formatNumber(totalBeneficiaries), 'Membaca beneficiary_aggregates'],
    [`Total Nilai Outcome ${dashboardYear}`, formatCurrency(totalOutcome), 'Membaca final_value_aggregates'],
    [`Nilai SROI ${dashboardYear}`, sroi ? sroi.toFixed(2)+'x' : '0.00x', 'Outcome ÷ investasi']
  ];
  document.getElementById('stats').innerHTML = data.map(([k,v,h],i)=>`<div class="stat"><div class="k">${k}</div><div class="v">${v}</div><div class="k" style="margin-top:8px">${h}</div></div>`).join('');
}
function renderList(){
  const arr = filteredRecords();
  const root = document.getElementById('recordList');
  if(!arr.length){ root.innerHTML = '<div class="muted">Tidak ada data.</div>'; return; }
  root.innerHTML = arr.map(r=>`<div class="item ${r.id===selectedId?'active':''}" data-id="${r.id}"><div style="font-weight:800">${escapeHtml(r.title||'Tanpa Judul')}</div><div class="meta">${escapeHtml(r.ontology?.identity?.program||'-')}</div><div class="meta">${escapeHtml(r.ontology?.ontology_meta?.ontology_id||'-')}</div></div>`).join('');
  root.querySelectorAll('.item').forEach(el=>el.onclick=()=>{ selectedId=el.dataset.id; render(); });
}
function aggregateCard(agg, components, kind){
  if(!agg) return '<div class="agg"><div class="muted">belum tersedia</div></div>';
  const total = kind==='beneficiary' ? `${formatNumber(agg.count)} ${agg.unit||''}` : formatCurrency(agg.amount_idr);
  return `<div class="agg"><div class="agghead"><div><div class="aggtitle">${escapeHtml(agg.label||'Tanpa Label')}</div><div class="muted">${agg.year ? 'Tahun '+escapeHtml(agg.year) : ''}</div></div><div class="aggvalue">${escapeHtml(total)}</div></div>
    <details class="mini-acc" style="margin-top:12px"><summary>Lihat breakdown <span>›</span></summary><div class="body"><div class="breaklist">${components.map(c=>`<div class="breakitem"><div class="breakrow"><div><strong>${escapeHtml(c.contributor_name||c.name||c.label||c.id)}</strong>${c.contributor_code?` <span class="muted">(${escapeHtml(c.contributor_code)})</span>`:''}<div class="muted">${escapeHtml(c.description||'')}</div></div><div><strong>${escapeHtml(kind==='beneficiary' ? `${formatNumber(c.count)} ${c.unit||''}` : formatCurrency(c.amount_idr))}</strong></div></div>${(c.breakdown_items&&c.breakdown_items.length)?`<div class="subdetails">${c.breakdown_items.map(b=>`<div class="breakrow" style="margin-top:6px"><div>${escapeHtml(b.label||b.id)}</div><div><strong>${escapeHtml(formatCurrency(b.amount_idr))}</strong></div></div>`).join('')}</div>`:''}</div>`).join('')}</div></div></details>
  </div>`;
}
function renderDetail(){

  const o = rec.ontology;
  const invAgg = (o.investment_aggregates||[]).find(x=>String(x.year)===dashboardYear&&x.display_as_primary_summary);
  const benAgg = (o.beneficiary_aggregates||[]).find(x=>x.display_as_primary_summary);
  const valAgg = (o.final_value_aggregates||[]).find(x=>String(x.year)===dashboardYear&&x.display_as_primary_summary);
  const invComp = invAgg ? invAgg.component_ids.map(id=>o.investment_nodes.find(n=>n.id===id)).filter(Boolean) : [];
  const benComp = benAgg ? benAgg.component_ids.map(id=>o.beneficiary_nodes.find(n=>n.id===id)).filter(Boolean) : [];
  const valComp = valAgg ? valAgg.component_ids.map(id=>o.final_value_nodes.find(n=>n.id===id)).filter(Boolean) : [];
  root.innerHTML = `
    <div class="hero">
      <h2>${escapeHtml(rec.title||o.identity?.sub_program||'Tanpa Judul')}</h2>
      <div class="badges">
        <span class="badge">Program: ${escapeHtml(o.identity?.program||'-')}</span>
        <span class="badge">Sub-program: ${escapeHtml(o.identity?.sub_program||'-')}</span>
        <span class="badge">Ontology ID: ${escapeHtml(o.ontology_meta?.ontology_id||'-')}</span>
      </div>
    </div>
    <details class="section" open>
      <summary>Ringkasan Agregat <span>›</span></summary>
      <div class="body">
        <div class="grid2">
          ${aggregateCard(invAgg, invComp, 'investment')}
          ${aggregateCard(valAgg, valComp, 'value')}
        </div>
        <div style="margin-top:14px">${aggregateCard(benAgg, benComp, 'beneficiary')}</div>
      </div>
    </details>
    <details class="section">
      <summary>Struktur Ontology JSON <span>›</span></summary>
      <div class="body"><pre class="json">${escapeHtml(JSON.stringify(o,null,2))}</pre></div>
    </details>`;
}
function render(){ renderStats(); renderList(); renderDetail(); }
function openEditor(){
  const rec = selectedRecord(); if(!rec) return;
  document.getElementById('jsonEditor').value = JSON.stringify(rec.ontology, null, 2);
  document.getElementById('editModal').classList.add('open');
}
function closeEditor(){ document.getElementById('editModal').classList.remove('open'); }
function saveEditor(){
  const rec = selectedRecord(); if(!rec) return;
  let obj;
  try{ obj = JSON.parse(document.getElementById('jsonEditor').value); }
  catch{ alert('JSON belum valid.'); return; }
  rec.ontology = obj;
  persist();
  closeEditor();
  render();
}
function exportJson(){
  const blob = new Blob([JSON.stringify(records,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='tjsl_ehs_v6.json'; a.click(); URL.revokeObjectURL(url);
}
function importJson(file){
  const reader = new FileReader();
  reader.onload = e => {
    try{ const parsed = JSON.parse(e.target.result); if(!Array.isArray(parsed)) throw new Error(); records = parsed; selectedId = records[0]?.id || null; persist(); render(); }
    catch{ alert('File JSON tidak valid.'); }
  };
  reader.readAsText(file);
}

document.getElementById('yearSelect').addEventListener('change', e=>{ dashboardYear=e.target.value; render(); });
document.getElementById('searchInput').addEventListener('input', e=>{ searchTerm=e.target.value; render(); });
document.getElementById('btnEdit').addEventListener('click', openEditor);
document.getElementById('btnClose').addEventListener('click', closeEditor);
document.getElementById('btnCancel').addEventListener('click', closeEditor);
document.getElementById('btnSave').addEventListener('click', saveEditor);
document.getElementById('btnExport').addEventListener('click', exportJson);
document.getElementById('importFile').addEventListener('change', e=>{ if(e.target.files[0]) importJson(e.target.files[0]); });

initRecords(); render();
</script>
</body>
</html>
