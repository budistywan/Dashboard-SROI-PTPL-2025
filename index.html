<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SROI Ontology Manager</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

<div id="app" class="p-6">
    <header class="mb-8 flex justify-between items-center bg-white p-4 rounded-lg shadow-sm">
        <div>
            <h1 class="text-2xl font-bold text-blue-600">SROI Ontology Editor</h1>
            <p class="text-sm text-gray-500">ID: {{ ontology.ontology_meta.ontology_id || 'Tanpa ID' }} | Status: {{ ontology.ontology_meta.status }}</p>
        </div>
        <div class="space-x-2">
            <button @click="exportJSON" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Export JSON</button>
            <button @click="resetData" class="bg-red-100 text-red-600 px-4 py-2 rounded hover:bg-red-200">Reset</button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-1 space-y-6">
            <section class="bg-white p-4 rounded-lg shadow">
                <h2 class="font-bold border-b mb-4 pb-2">Identity</h2>
                <div class="space-y-3">
                    <div v-for="(val, key) in ontology.identity" :key="key">
                        <label class="block text-xs font-semibold uppercase text-gray-500">{{ key.replace('_', ' ') }}</label>
                        <input v-model="ontology.identity[key]" type="text" class="w-full border rounded p-1 text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
            </section>
        </div>

        <div class="lg:col-span-3 space-y-6">
            
            <section class="bg-white p-4 rounded-lg shadow">
                <h2 class="font-bold border-b mb-4 pb-2">Add New Node</h2>
                <div class="flex gap-2 flex-wrap">
                    <button @click="addNode('problem_nodes', 'P')" class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full border border-blue-200 hover:bg-blue-100 text-sm">+ Problem</button>
                    <button @click="addNode('activity_nodes', 'A')" class="bg-green-50 text-green-700 px-3 py-1 rounded-full border border-green-200 hover:bg-green-100 text-sm">+ Activity</button>
                    <button @click="addNode('stakeholder_nodes', 'S')" class="bg-purple-50 text-purple-700 px-3 py-1 rounded-full border border-purple-200 hover:bg-purple-100 text-sm">+ Stakeholder</button>
                    <button @click="addNode('outcome_nodes', 'OC')" class="bg-yellow-50 text-yellow-700 px-3 py-1 rounded-full border border-yellow-200 hover:bg-yellow-100 text-sm">+ Outcome</button>
                </div>
            </section>

            <section v-if="ontology.problem_nodes.length > 0" class="bg-white p-4 rounded-lg shadow">
                <h2 class="font-bold text-red-600 mb-4 flex items-center">
                    <span class="mr-2">🚩</span> Problem Nodes
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="p-2 border">ID</th>
                                <th class="p-2 border">Label</th>
                                <th class="p-2 border">Dimension</th>
                                <th class="p-2 border">Aksi</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="(node, index) in ontology.problem_nodes" :key="node.id">
                                <td class="p-2 border font-mono text-xs">{{ node.id }}</td>
                                <td class="p-2 border"><input v-model="node.label" class="w-full"></td>
                                <td class="p-2 border">
                                    <select v-model="node.dimension" class="w-full">
                                        <option value="economic">Economic</option>
                                        <option value="social">Social</option>
                                        <option value="environmental">Environmental</option>
                                    </select>
                                </td>
                                <td class="p-2 border">
                                    <button @click="deleteNode('problem_nodes', index)" class="text-red-500 hover:underline">Hapus</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="bg-gray-800 p-4 rounded-lg shadow">
                <h2 class="text-white font-bold mb-2">Live Ontology Output (JSON)</h2>
                <pre class="text-green-400 text-xs overflow-auto max-h-64">{{ JSON.stringify(ontology, null, 2) }}</pre>
            </section>

        </div>
    </div>
</div>

<script>
const { createApp } = Vue

createApp({
    data() {
        return {
            // Template dasar sesuai schema anda
            ontology: {
                ontology_meta: { ontology_id: "SROI-2026-001", version: "1.0", status: "draft", source_of_truth: true },
                identity: { cdo_name: "", unit_kerja: "", lokasi_pelaksanaan: "", program: "", sub_program: "", row_context_label: "" },
                problem_nodes: [],
                activity_nodes: [],
                stakeholder_nodes: [],
                investment_nodes: [],
                beneficiary_nodes: [],
                output_nodes: [],
                baseline_nodes: [],
                outcome_nodes: [],
                indicator_nodes: [],
                monetisation_pre_fix_nodes: [],
                impact_adjustment_nodes: [],
                final_value_nodes: [],
                notes: [],
                relation_index: {
                    problem_to_activity: {},
                    activity_to_output: {},
                    output_to_outcome: {},
                    outcome_to_indicator: {},
                    indicator_to_monetisation: {},
                    monetisation_to_final_value: {}
                },
                column_render_bindings: {},
                render_config: { compact_separator: "\n", null_display: "belum tersedia", currency_locale: "id-ID" }
            }
        }
    },
    mounted() {
        const saved = localStorage.getItem('sroi_ontology_data');
        if (saved) {
            this.ontology = JSON.parse(saved);
        }
    },
    watch: {
        ontology: {
            handler(val) {
                localStorage.setItem('sroi_ontology_data', JSON.stringify(val));
            },
            deep: true
        }
    },
    methods: {
        addNode(collection, prefix) {
            const newId = `${prefix}${this.ontology[collection].length + 1}`;
            let newNode = { id: newId, label: "", description: "" };
            
            // Logika spesifik per tipe jika diperlukan
            if (collection === 'problem_nodes') newNode.dimension = 'social';
            
            this.ontology[collection].push(newNode);
        },
        deleteNode(collection, index) {
            if (confirm('Hapus node ini?')) {
                this.ontology[collection].splice(index, 1);
            }
        },
        exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.ontology, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `ontology_${this.ontology.ontology_meta.ontology_id}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        },
        resetData() {
            if (confirm('Hapus semua data dan reset ke template?')) {
                localStorage.removeItem('sroi_ontology_data');
                location.reload();
            }
        }
    }
}).mount('#app')
</script>
</body>
</html>
